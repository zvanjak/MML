name: Ubuntu

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

concurrency:
  group: ubuntu-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC
            compiler: gcc
            
          - name: Clang
            compiler: clang

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup ccache
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache
        echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

    - name: Restore ccache
      uses: actions/cache/restore@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-ubuntu-${{ matrix.name }}-${{ github.sha }}
        restore-keys: |
          ccache-ubuntu-${{ matrix.name }}-

    - name: Setup GCC
      if: matrix.compiler == 'gcc'
      run: |
        echo "CC=gcc" >> $GITHUB_ENV
        echo "CXX=g++" >> $GITHUB_ENV

    - name: Setup Clang
      if: matrix.compiler == 'clang'
      run: |
        echo "CC=clang" >> $GITHUB_ENV
        echo "CXX=clang++" >> $GITHUB_ENV

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build Tests
      timeout-minutes: 150
      # GCC uses significantly more memory than Clang - limit parallelism to avoid OOM
      run: |
        if [ "${{ matrix.compiler }}" = "gcc" ]; then
          cmake --build build --config ${{ env.BUILD_TYPE }} --target MML_Tests --parallel 2
        else
          cmake --build build --config ${{ env.BUILD_TYPE }} --target MML_Tests --parallel
        fi

    - name: Save ccache
      if: always()
      uses: actions/cache/save@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-ubuntu-${{ matrix.name }}-${{ github.sha }}

    - name: Test
      timeout-minutes: 5
      working-directory: build/tests
      run: |
        echo "=== Checking executable ==="
        ls -la MML_Tests
        file MML_Tests
        echo "=== Testing --help ==="
        timeout 30 ./MML_Tests --help || echo "help timed out with $?"
        echo "=== Listing tests (first 20) ==="
        timeout 60 ./MML_Tests --list-tests 2>&1 | head -20 || echo "list timed out with $?"
        echo "=== Running just one test ==="
        timeout 120 ./MML_Tests "Vector3Cartesian - basic" --reporter console 2>&1 || echo "single test exit: $?"
        echo "=== Diagnostics done ==="

    - name: ccache stats
      run: ccache --show-stats

    - name: Upload test results on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-ubuntu-${{ matrix.name }}
        path: build/Testing/Temporary/
        retention-days: 7
